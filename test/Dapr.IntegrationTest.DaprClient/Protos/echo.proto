syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "Dapr.IntegrationTest.DaprClient";

package dapr.integrationtest.client;

// Simple echo service used by gRPC proxy integration tests.
service EchoService {
  // Unary echo: returns the same message that was sent.
  rpc Echo(EchoRequest) returns (EchoReply);

  // Bidirectional-streaming echo: reflects every incoming message back.
  rpc BidirectionalEcho(stream EchoRequest) returns (stream EchoReply);

  // Delayed response used to test deadline / timeout behavior.
  rpc SlowEcho(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message EchoRequest {
  string message = 1;
}

message EchoReply {
  string message = 1;
}
